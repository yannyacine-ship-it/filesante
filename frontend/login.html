<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileSanté — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue-50: #EDF5FF; --blue-400: #3E8EF7; --blue-600: #1965D4; --blue-800: #0D3B8A;
      --gray-50: #F8F7F5; --gray-100: #EDEDEA; --gray-200: #DDDCDA;
      --gray-400: #9B9A94; --gray-700: #3D3D3A; --gray-900: #1A1A18;
      --red-50: #FEF2F2; --red-600: #DC2626;
      --white: #FFFFFF;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0D3B8A 0%, #1965D4 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--white); border-radius: 24px;
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }
    .logo-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
    }
    .logo-text { font-size: 20px; font-weight: 600; color: var(--gray-900); }
    .logo-text span { color: var(--blue-600); }
    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 26px; color: var(--gray-900); margin-bottom: 6px;
    }
    .subtitle { font-size: 14px; color: var(--gray-400); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 600; color: var(--gray-700); display: block; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      border: 1.5px solid var(--gray-200); font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--gray-900); outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--blue-400); }
    .error {
      display: none; background: var(--red-50); color: var(--red-600);
      font-size: 13px; padding: 10px 14px; border-radius: 9px; margin-bottom: 16px;
    }
    .error.show { display: block; }
    .btn {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: var(--blue-600); color: white; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: var(--blue-800); transform: translateY(-1px); }
    .demo-hint {
      margin-top: 20px; padding: 12px 14px; background: var(--blue-50);
      border-radius: 10px; font-size: 12px; color: var(--blue-600); line-height: 1.6;
    }
    .demo-hint strong { display: block; margin-bottom: 2px; }
    .role-select {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;
    }
    .role-btn {
      padding: 10px; border-radius: 10px; border: 1.5px solid var(--gray-200);
      background: var(--white); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; color: var(--gray-400); cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .role-btn.active { border-color: var(--blue-600); background: var(--blue-50); color: var(--blue-600); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <svg width="32" height="32" viewBox="0 0 38 38" fill="none">
      <rect width="38" height="38" rx="9" fill="#1965D4"/>
      <rect x="16" y="8" width="6" height="22" rx="3" fill="white"/>
      <rect x="8" y="16" width="22" height="6" rx="3" fill="white"/>
    </svg>
    <span class="logo-text">File<span>Santé</span></span>
  </div>

  <h1>Connexion</h1>
  <p class="subtitle">Accès réservé au personnel hospitalier</p>

  <div class="role-select">
    <button class="role-btn active" onclick="setRole('infirmiere', this)" id="role-inf">
      🩺 Infirmière
    </button>
    <button class="role-btn" onclick="setRole('medecin', this)" id="role-med">
      👨‍⚕️ Médecin
    </button>
  </div>

  <div id="errorMsg" class="error">Identifiants incorrects. Réessayez.</div>

  <div class="form-group">
    <label>Identifiant</label>
    <input type="text" id="username" placeholder="Ex: infirmiere.triage" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') login()">
  </div>

  <button class="btn" onclick="login()">Se connecter</button>

  <div class="demo-hint">
    <strong>Comptes démo :</strong>
    Infirmière : <code>infirmiere</code> / <code>filesante2025</code><br>
    Médecin : <code>medecin</code> / <code>filesante2025</code>
  </div>
</div>

<script>
  let selectedRole = 'infirmiere';
  function setRole(role, btn) {
    selectedRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const base = window.location.pathname.replace('login.html','');
  const USERS = {
    'infirmiere': { pass: 'filesante2025', role: 'Infirmière — Triage', redirect: base + 'dashboard.html' },
    'medecin':    { pass: 'filesante2025', role: 'Médecin',             redirect: base + 'dashboard.html' },
    'admin':      { pass: 'admin2025',     role: 'Administrateur',      redirect: base + 'dashboard.html' },
  };

  function login() {
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    if (USERS[u] && USERS[u].pass === p) {
      sessionStorage.setItem('fs_user', u);
      sessionStorage.setItem('fs_role', USERS[u].role);
      err.classList.remove('show');
      window.location.href = USERS[u].redirect;
    } else {
      err.classList.add('show');
      document.getElementById('password').value = '';
    }
  }
</script>
</body>
</html>
